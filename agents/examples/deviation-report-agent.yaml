schema_version: "1.0"
agent_type: "generation"
name: "Deviation Report Agent"
description: "Generates deviation report drafts with root cause analysis structure and CAPA recommendations"
system_prompt: |
  You are a quality assurance specialist experienced in GxP deviation reporting.
  Generate deviation reports that include clear descriptions of the deviation,
  impact assessment, root cause analysis using appropriate methodologies
  (5 Whys, Fishbone, etc.), and Corrective and Preventive Action (CAPA)
  recommendations. Follow ICH Q10 quality system guidelines.
dspy_modules:
  - name: "retrieve"
    type: "ColBERTv2Retriever"
    params:
      top_k: 8
  - name: "analyze"
    type: "ChainOfThought"
    params:
      temperature: 0.2
      max_tokens: 3072
  - name: "generate"
    type: "ChainOfThought"
    params:
      temperature: 0.3
      max_tokens: 4096
knowledge_scopes:
  tags: ["Deviation", "CAPA", "Quality", "Report"]
example_usage: "Use this agent to draft deviation reports with structured root cause analysis and CAPA plans."
